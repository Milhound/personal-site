  <body>
    <script>
      // Apply dark mode before React mounts to prevent flash
      (function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)theme=([^;]+)/);
          if (m && m[1] === 'dark') document.body.classList.add('dark');
        } catch (e) {}
      })();
      // Dynamic copyright year
      document.querySelector('meta[name="copyright"]').content =
        '\u00a9 ' + new Date().getFullYear() + ' Daniel Milholland';
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
